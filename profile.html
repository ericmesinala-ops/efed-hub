<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c0000e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EFED Hub">
<title>EFED Hub — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #07070a; --surface: #111114; --surface2: #1a1a1f;
  --accent: #c0000e; --gold: #c8a84b; --text: #e8e8e8;
  --muted: #5a5a6a; --border: rgba(255,255,255,.07);
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(7,7,10,.95), transparent);
  backdrop-filter: blur(12px);
}
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 4px; color: #fff; text-decoration: none; }
.nav-logo em { color: var(--gold); font-style: normal; }
.nav-back {
  display: flex; align-items: center; gap: 6px;
  font-size: .72rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); cursor: pointer; border: none; background: none;
  transition: color .2s; text-decoration: none;
}
.nav-back:hover { color: #fff; }

/* Banner */
.profile-banner {
  height: 220px; margin-top: 0;
  background: linear-gradient(135deg, #1a0005 0%, #0d0d12 40%, #07070a 100%);
  position: relative; overflow: hidden;
}
.profile-banner::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 100% at 50% 0%, rgba(192,0,14,.15) 0%, transparent 70%);
}
.banner-pattern {
  position: absolute; inset: 0; opacity: .04;
  background-image: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
  background-size: 20px 20px;
}

/* Profile content */
.profile-content { max-width: 680px; margin: 0 auto; padding: 0 24px 80px; position: relative; }

/* Avatar */
.profile-avatar-wrap {
  position: relative; margin-top: -52px; margin-bottom: 16px;
  display: flex; align-items: flex-end; justify-content: space-between;
}
.profile-avatar {
  width: 104px; height: 104px; border-radius: 50%;
  border: 4px solid var(--bg);
  background: rgba(192,0,14,.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem;
  color: var(--accent); overflow: hidden; flex-shrink: 0;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.edit-btn {
  padding: 9px 20px; border-radius: 40px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: .72rem;
  font-weight: 600; letter-spacing: 1px; cursor: pointer;
  backdrop-filter: blur(10px); transition: background .2s; margin-bottom: 4px;
}
.edit-btn:hover { background: rgba(255,255,255,.13); }

.profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: #fff; margin-bottom: 2px; }
.profile-username { font-size: .72rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 12px; }
.profile-joined {
  font-size: .65rem; color: var(--muted); letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
}

/* Stats */
.profile-stats {
  display: flex; gap: 24px; padding: 16px 0;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.stat { text-align: center; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: #fff; line-height: 1; }
.stat-label { font-size: .58rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

/* Section title */
.section-title {
  font-size: .6rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: rgba(200,168,75,.15); }

/* Posts grid */
.posts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.post-card { cursor: pointer; }
.post-thumb {
  width: 100%; aspect-ratio: 16/9; border-radius: 8px;
  overflow: hidden; background: var(--surface2); position: relative; margin-bottom: 8px;
  transition: transform .25s;
}
.post-card:hover .post-thumb { transform: scale(1.03); }
.post-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.post-thumb-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.3);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.post-card:hover .post-thumb-overlay { opacity: 1; }
.play-circle-sm {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(192,0,14,.9); display: flex; align-items: center; justify-content: center;
}
.comm-badge {
  position: absolute; top: 6px; left: 6px;
  background: rgba(192,0,14,.85); color: #fff;
  font-size: .5rem; letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 700; padding: 3px 7px; border-radius: 4px;
}
.post-efed { font-size: .55rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
.post-title { font-size: .78rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.post-date { font-size: .62rem; color: var(--muted); margin-top: 2px; }

.empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: .8rem; line-height: 1.6; }
.loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: .8rem; }

@media (max-width: 480px) {
  nav { padding: 14px 16px; }
  .profile-content { padding: 0 16px 60px; }
  .profile-name { font-size: 1.6rem; }
  .profile-stats { gap: 16px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><em>EFED</em> Streaming Hub</a>
  <a class="nav-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Hub
  </a>
</nav>

<div class="profile-banner"><div class="banner-pattern"></div></div>

<div class="profile-content">

  <div class="profile-avatar-wrap">
    <div class="profile-avatar" id="profile-avatar-circle">
      <span id="profile-avatar-initial">?</span>
    </div>
    <button class="edit-btn" id="edit-btn" style="display:none;" onclick="goToSettings()">✏ Edit Profile</button>
  </div>

  <div id="profile-name" class="profile-name">—</div>
  <div id="profile-username" class="profile-username">@—</div>
  <div class="profile-joined">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span id="profile-joined">—</span>
  </div>

  <div class="profile-stats">
    <div class="stat"><div class="stat-num" id="stat-posts">—</div><div class="stat-label">Posts</div></div>
    <div class="stat"><div class="stat-num" id="stat-supported">—</div><div class="stat-label">Supported</div></div>
    <div class="stat"><div class="stat-num" id="stat-rated">—</div><div class="stat-label">Rated</div></div>
    <div class="stat" id="stat-invites-wrap"><div class="stat-num" id="stat-invites">—</div><div class="stat-label">Invites Left</div></div>
  </div>

  <div class="section-title">Posted Shows</div>
  <div id="posts-grid" class="posts-grid">
    <div class="loading" style="grid-column:span 2;">Loading…</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://osbarvhklizidsffytye.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYmFydmhrbGl6aWRzZmZ5dHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjQ4MzksImV4cCI6MjA4ODg0MDgzOX0.c9EDHCFY50VzSTmz0EUTq1XrX0AvJdynFPxIWT5K7JM';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

function getSession() {
  try { return JSON.parse(localStorage.getItem('efed_session')); } catch { return null; }
}

async function sbGet(table, filters = '') {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + filters, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function extractId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}

function goToSettings() {
  window.location.href = 'index.html#settings';
}

async function loadProfile() {
  const session = getSession();
  if (!session) { window.location.replace('auth.html'); return; }

  // Get username from URL param or default to logged in user
  const params = new URLSearchParams(window.location.search);
  const targetUser = params.get('u') || session.username;
  const isOwn = targetUser.toLowerCase() === session.username.toLowerCase();

  try {
    // Load user data
    const users = await sbGet('users', `username=eq.${encodeURIComponent(targetUser)}`);
    if (!users.length) { document.getElementById('profile-name').textContent = 'User not found'; return; }
    const user = users[0];

    // Avatar
    const circle = document.getElementById('profile-avatar-circle');
    const initial = (user.display_name || user.username)[0].toUpperCase();
    document.getElementById('profile-avatar-initial').textContent = initial;
    if (user.avatar_url) {
      circle.innerHTML = `<img src="${user.avatar_url}" alt="${user.username}" onerror="this.outerHTML='<span>${initial}</span>'">`;
    }

    // Name + username
    document.getElementById('profile-name').textContent = user.display_name || user.username;
    document.getElementById('profile-username').textContent = '@' + user.username;
    document.title = (user.display_name || user.username) + ' — EFED Hub';

    // Join date
    const joined = new Date(user.joined_at);
    document.getElementById('profile-joined').textContent = 'Joined ' + joined.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    // Show edit button only for own profile
    if (isOwn) document.getElementById('edit-btn').style.display = 'block';

    // Load stats in parallel
    const [posts, rated, invites] = await Promise.all([
      sbGet('submissions', `submitted_by=eq.${encodeURIComponent(targetUser)}&status=eq.approved`),
      sbGet('ratings', `username=eq.${encodeURIComponent(targetUser)}`),
      isOwn ? sbGet('invites', `created_by=eq.${encodeURIComponent(targetUser)}&used=eq.false`) : Promise.resolve([])
    ]);

    document.getElementById('stat-posts').textContent = posts.length;
    document.getElementById('stat-supported').textContent = user.supported_count || 0;
    document.getElementById('stat-rated').textContent = rated.length;

    // Show Creator badge if applicable
    if (user.is_creator) {
      const nameEl = document.getElementById('profile-name');
      nameEl.innerHTML = nameEl.textContent + ' <span style="font-family:DM Sans,sans-serif;font-size:.7rem;color:#c8a84b;letter-spacing:1px;vertical-align:middle;">🎬 Creator</span>';
    }

    if (isOwn) {
      document.getElementById('stat-invites').textContent = invites.length;
    } else {
      document.getElementById('stat-invites-wrap').style.display = 'none';
    }

    // Load posted shows
    const grid = document.getElementById('posts-grid');
    if (!posts.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:span 2;">No shows posted yet.</div>';
      return;
    }

    grid.innerHTML = '';
    posts.sort((a, b) => (b.date_ms || 0) - (a.date_ms || 0)).forEach(s => {
      const id = extractId(s.url);
      const thumb = id ? `https://i.ytimg.com/vi/${id}/maxresdefault.jpg` : '';
      const card = document.createElement('div');
      card.className = 'post-card';
      card.onclick = () => window.location.href = 'index.html';
      card.innerHTML = `
        <div class="post-thumb">
          ${thumb ? `<img src="${thumb}" alt="${s.show_name || ''}" onerror="this.src='https://i.ytimg.com/vi/${id}/hqdefault.jpg'">` : ''}
          <div class="comm-badge">Community</div>
          <div class="post-thumb-overlay">
            <div class="play-circle-sm">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="white" style="margin-left:2px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
          </div>
        </div>
        <div class="post-efed">${s.efed || ''}</div>
        <div class="post-title">${s.show_name || ''}</div>
        <div class="post-date">${s.date || ''}</div>`;
      grid.appendChild(card);
    });

  } catch(e) {
    console.error(e);
    document.getElementById('profile-name').textContent = 'Could not load profile.';
  }
}

loadProfile();
</script>
</body>
</html>
