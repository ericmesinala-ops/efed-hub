<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — EFED Streaming Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<script>
  window.__clerk_publishable_key = 'pk_test_Z29yZ2VvdXMtYWtpdGEtODYuY2xlcmsuYWNjb3VudHMuZGV2JA';
</script>
<script async crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c0000e;
    --gold: #c8a84b;
    --bg: #07070a;
    --surface: #0f0f13;
    --muted: #5a5a6a;
    --text: #e8e8e8;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Animated background */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(192,0,14,.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(200,168,75,.08) 0%, transparent 60%),
      var(--bg);
  }

  /* Grain */
  .bg-layer::after {
    content: '';
    position: absolute; inset: 0; opacity: .04; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
    animation: grain .8s steps(2) infinite;
  }
  @keyframes grain {
    0%{background-position:0 0} 25%{background-position:18px -14px}
    50%{background-position:-8px 18px} 75%{background-position:14px 8px}
    100%{background-position:-18px -4px}
  }

  /* Horizontal scan line */
  .scan {
    position: fixed; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(192,0,14,.4), transparent);
    z-index: 1; pointer-events: none;
    animation: scan 6s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes scan {
    0%   { top: -2px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  /* Stage */
  .stage {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  /* Logo */
  .logo {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 48px;
    animation: fadeUp .6s ease both;
  }
  .logo-eyebrow {
    font-size: .55rem; letter-spacing: 4px; color: var(--muted);
    text-transform: uppercase; font-weight: 300; font-style: italic;
    margin-bottom: 6px;
  }
  .logo-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    letter-spacing: 8px; color: #fff; line-height: 1;
    filter: drop-shadow(0 0 30px rgba(192,0,14,.3));
  }
  .logo-main em { color: var(--gold); font-style: normal; }
  .logo-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(.9rem, 2.5vw, 1.2rem);
    letter-spacing: 6px; color: rgba(255,255,255,.25);
    margin-top: 4px;
  }

  /* Gold rule */
  .rule {
    width: clamp(60px, 15vw, 120px); height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 48px;
    animation: fadeUp .6s .1s ease both;
  }

  /* Card */
  .card {
    width: 100%; max-width: 380px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 16px;
    padding: 40px 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    animation: fadeUp .6s .15s ease both;
  }

  .card-eyebrow {
    font-size: .55rem; letter-spacing: 3px; color: var(--gold);
    text-transform: uppercase; font-weight: 700;
    text-align: center; margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 3px;
    color: #fff; text-align: center; margin-bottom: 6px;
  }
  .card-sub {
    font-size: .75rem; color: var(--muted); text-align: center;
    line-height: 1.6; margin-bottom: 32px;
  }

  /* X Button */
  .x-btn {
    width: 100%; padding: 14px 20px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: #fff; border: none; border-radius: 10px;
    color: #000; font-family: 'DM Sans', sans-serif;
    font-size: .88rem; font-weight: 700; letter-spacing: .5px;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
    position: relative; overflow: hidden;
  }
  .x-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .x-btn:hover {
    background: #f0f0f0;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .x-btn:active { transform: translateY(0); }
  .x-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .x-btn svg { flex-shrink: 0; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,.07); }
  .divider-text { font-size: .6rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* Member badge */
  .member-note {
    text-align: center; font-size: .68rem; color: rgba(255,255,255,.2);
    line-height: 1.6; margin-top: 20px;
  }
  .member-note a {
    color: var(--gold); text-decoration: none;
    transition: opacity .2s;
  }
  .member-note a:hover { opacity: .7; }

  /* Error */
  .error-box {
    display: none; margin-bottom: 20px;
    background: rgba(192,0,14,.1); border: 1px solid rgba(192,0,14,.3);
    border-radius: 8px; padding: 10px 14px;
    font-size: .78rem; color: #ff6b6b; line-height: 1.5; text-align: center;
  }
  .error-box.visible { display: block; }

  /* Loading spinner */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2);
    border-top-color: #000; border-radius: 50%;
    animation: spin .6s linear infinite; display: none;
  }
  .x-btn.loading .spinner { display: block; }
  .x-btn.loading .x-icon { display: none; }
  .x-btn.loading .x-label { opacity: .6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Already signed in state */
  .signed-in {
    display: none; text-align: center;
  }
  .signed-in.visible { display: block; }
  .signed-in-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid var(--gold); margin: 0 auto 16px;
    object-fit: cover; display: block;
    background: var(--surface);
  }
  .signed-in-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
    letter-spacing: 2px; color: #fff; margin-bottom: 4px;
  }
  .signed-in-handle { font-size: .75rem; color: var(--muted); margin-bottom: 24px; }
  .go-btn {
    width: 100%; padding: 13px;
    background: var(--gold); border: none; border-radius: 10px;
    color: #000; font-family: 'DM Sans', sans-serif;
    font-size: .82rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: opacity .2s;
    margin-bottom: 12px;
  }
  .go-btn:hover { opacity: .87; }
  .signout-link {
    font-size: .7rem; color: var(--muted); cursor: pointer;
    background: none; border: none; font-family: 'DM Sans', sans-serif;
    transition: color .2s; display: block; margin: 0 auto;
  }
  .signout-link:hover { color: rgba(255,255,255,.5); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="scan"></div>

<div class="stage">

  <div class="logo">
    <span class="logo-eyebrow">The Official</span>
    <div class="logo-main"><em>EFED</em> Streaming Hub</div>
    <div class="logo-sub">Streaming Hub</div>
  </div>

  <div class="rule"></div>

  <div class="card">
    <div class="card-eyebrow">Member Access</div>
    <div class="card-title">Welcome Back</div>
    <p class="card-sub">Sign in with your X account to access exclusive EFED content.</p>

    <div class="error-box" id="error-box"></div>

    <!-- Default: sign in -->
    <div id="signin-view">
      <button class="x-btn" id="x-btn" onclick="handleXLogin()">
        <div class="spinner"></div>
        <svg class="x-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <span class="x-label">Continue with X</span>
      </button>

      <div class="member-note">
        By signing in you agree to our terms.<br>
        <a href="opener.html">← Back to Intro</a>
      </div>
    </div>

    <!-- Already signed in -->
    <div class="signed-in" id="signed-in-view">
      <img class="signed-in-avatar" id="user-avatar" src="" alt="">
      <div class="signed-in-name" id="user-name"></div>
      <div class="signed-in-handle" id="user-handle"></div>
      <button class="go-btn" onclick="goToHub()">Enter the Hub →</button>
      <button class="signout-link" onclick="handleSignOut()">Sign out</button>
    </div>

  </div>
</div>

<script>
  const HUB_URL = 'index.html'; // change to your full Vercel URL if needed

  let clerkReady = false;

  window.addEventListener('load', async () => {
    try {
      await window.Clerk.load();
      clerkReady = true;

      // Already signed in — go straight to hub
      if (window.Clerk.user) {
        window.location.replace('index.html');
        return;
      }
    } catch (e) {
      showError('Authentication service unavailable. Please try again later.');
      console.warn('Clerk failed:', e);
    }
  });

  async function handleXLogin() {
    if (!clerkReady) return showError('Auth service not ready. Please refresh.');
    const btn = document.getElementById('x-btn');
    btn.classList.add('loading');
    btn.disabled = true;
    clearError();
    try {
      await window.Clerk.client.signIn.authenticateWithRedirect({
        strategy: 'oauth_x',
        redirectUrl: 'sso-callback.html',
        redirectUrlComplete: 'index.html',
      });
    } catch (err) {
      showError(err.errors?.[0]?.longMessage || 'X sign-in failed. Please try again.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showSignedIn(user) {
    document.getElementById('signin-view').style.display = 'none';
    const view = document.getElementById('signed-in-view');
    view.classList.add('visible');

    const name = [user.firstName, user.lastName].filter(Boolean).join(' ') || user.username || 'Member';
    const handle = user.username ? '@' + user.username : user.primaryEmailAddress?.emailAddress || '';
    const avatar = user.imageUrl || '';

    document.getElementById('user-name').textContent = name;
    document.getElementById('user-handle').textContent = handle;
    const avatarEl = document.getElementById('user-avatar');
    if (avatar) { avatarEl.src = avatar; } else { avatarEl.style.display = 'none'; }
  }

  function goToHub() {
    window.location.href = HUB_URL;
  }

  async function handleSignOut() {
    if (!clerkReady) return;
    await window.Clerk.signOut();
    document.getElementById('signed-in-view').classList.remove('visible');
    document.getElementById('signin-view').style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() {
    const el = document.getElementById('error-box');
    el.classList.remove('visible');
    el.textContent = '';
  }
</script>
</body>
</html>
