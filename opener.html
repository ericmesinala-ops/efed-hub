<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFED Streaming Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600&display=swap" rel="stylesheet">
<script>
  window.__clerk_publishable_key = 'pk_test_Z29yZ2VvdXMtYWtpdGEtODYuY2xlcmsuYWNjb3VudHMuZGV2JA';
</script>
<script async crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c0000e;
    --gold: #c8a84b;
    --bg: #07070a;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── STAGE ── */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }

  /* Noise grain overlay */
  #stage::after {
    content: '';
    position: absolute; inset: 0; z-index: 10; pointer-events: none;
    opacity: .04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
    animation: grain .8s steps(2) infinite;
  }
  @keyframes grain {
    0%   { background-position: 0 0 }
    25%  { background-position: 18px -14px }
    50%  { background-position: -8px 18px }
    75%  { background-position: 14px 8px }
    100% { background-position: -18px -4px }
  }

  /* ── RED FLASH (Netflix-style) ── */
  #flash {
    position: absolute; inset: 0; z-index: 5;
    background: var(--red);
    opacity: 0;
    pointer-events: none;
  }

  /* ── LOGO CONTAINER ── */
  #logo-wrap {
    position: relative; z-index: 6;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0;
    transform: scale(1.15);
  }

  /* Cinematic vertical bars — Netflix uses a single N, we use the full wordmark */
  #logo-bars {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 0;
    overflow: hidden;
    height: clamp(90px, 18vw, 180px);
  }

  /* Each letter column */
  .l-col {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }

  /* The actual bar/letter */
  .l-bar {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 18vw, 180px);
    line-height: 1;
    color: var(--red);
    letter-spacing: -2px;
    transform: translateY(100%);
    display: block;
    filter: drop-shadow(0 0 40px rgba(192,0,14,.6));
  }

  /* Gold accent letters */
  .l-bar.gold {
    color: var(--gold);
    filter: drop-shadow(0 0 30px rgba(200,168,75,.5));
  }

  /* Sub-wordmark */
  #sub-wrap {
    margin-top: 10px;
    overflow: hidden;
    height: clamp(18px, 3vw, 32px);
  }

  #sub-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 3vw, 32px);
    letter-spacing: clamp(6px, 2vw, 20px);
    color: rgba(255,255,255,0);
    text-transform: uppercase;
    transform: translateY(100%);
    display: block;
    white-space: nowrap;
    text-align: center;
    /* revealed via clip — color transitions in */
  }

  /* Gold line under wordmark */
  #gold-line {
    width: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin-top: 14px;
    border-radius: 1px;
  }

  /* ── GLOW PULSE on logo ── */
  #glow {
    position: absolute;
    width: 120%; height: 120%;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(ellipse at center, rgba(192,0,14,.35) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    border-radius: 50%;
  }

  /* ── SOUND WAVE bars (decorative) ── */
  #eq {
    display: flex; align-items: flex-end; gap: 3px;
    margin-top: 22px;
    opacity: 0;
    height: 20px;
  }
  .eq-b {
    width: 3px; border-radius: 2px;
    background: var(--gold);
    animation: eq-anim 0s ease-in-out infinite alternate;
  }
  .eq-b:nth-child(1)  { height: 8px;  animation-duration: .5s; }
  .eq-b:nth-child(2)  { height: 16px; animation-duration: .7s; animation-delay: .05s; }
  .eq-b:nth-child(3)  { height: 10px; animation-duration: .4s; animation-delay: .1s;  }
  .eq-b:nth-child(4)  { height: 20px; animation-duration: .6s; animation-delay: .15s; }
  .eq-b:nth-child(5)  { height: 12px; animation-duration: .5s; animation-delay: .08s; }
  .eq-b:nth-child(6)  { height: 18px; animation-duration: .65s; animation-delay: .2s; }
  .eq-b:nth-child(7)  { height: 8px;  animation-duration: .45s; animation-delay: .12s; }
  .eq-b:nth-child(8)  { height: 14px; animation-duration: .55s; animation-delay: .03s; }
  .eq-b:nth-child(9)  { height: 10px; animation-duration: .7s;  animation-delay: .18s; }
  .eq-b:nth-child(10) { height: 6px;  animation-duration: .5s;  animation-delay: .07s; }
  @keyframes eq-anim {
    from { transform: scaleY(.15); opacity: .4; }
    to   { transform: scaleY(1);   opacity: 1;  }
  }

  /* ── FADE TO SITE ── */
  #curtain {
    position: fixed; inset: 0; z-index: 20;
    background: #000;
    opacity: 1;
    pointer-events: none;
  }

  /* ── SKIP HINT ── */
  #skip {
    position: fixed; bottom: 32px; right: 40px;
    z-index: 30; font-size: .62rem; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(255,255,255,.2);
    cursor: pointer; border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    transition: color .2s;
    opacity: 0;
  }
  #skip:hover { color: rgba(255,255,255,.5); }
</style>
</head>
<body>

<div id="curtain"></div>
<div id="flash"></div>

<div id="stage">
  <div id="logo-wrap">
    <div id="glow"></div>

    <!-- Main wordmark: EFED -->
    <div id="logo-bars">
      <div class="l-col"><span class="l-bar gold" id="l0">E</span></div>
      <div class="l-col"><span class="l-bar" id="l1">F</span></div>
      <div class="l-col"><span class="l-bar" id="l2">E</span></div>
      <div class="l-col"><span class="l-bar gold" id="l3">D</span></div>
    </div>

    <!-- Subtitle -->
    <div id="sub-wrap">
      <span id="sub-text">Streaming Hub</span>
    </div>

    <!-- Gold rule -->
    <div id="gold-line"></div>

    <!-- EQ bars -->
    <div id="eq">
      <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
      <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
      <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
      <div class="eq-b"></div>
    </div>
  </div>
</div>

<button id="skip" onclick="skipToSite()">Skip ›</button>

<script>
  // ── TIMING CONFIG (ms) ──
  const T = {
    curtainFade:  400,   // initial black fade out
    letterStagger: 60,  // delay between each letter rising
    letterRise:   500,  // each letter animation duration
    flashIn:      80,   // red flash
    flashHold:    60,
    flashOut:     220,
    glowIn:       600,
    subRise:      500,
    goldLine:     700,
    eqFadeIn:     400,
    hold:         1400,  // how long to hold before exiting
    exitFlash:    120,
    curtainIn:    600,
  };

  function ease(t, power = 3) {
    return 1 - Math.pow(1 - t, power);
  }

  function animate(el, keyframes, duration, delay = 0, easing = 'cubic-bezier(.22,1,.36,1)') {
    return new Promise(resolve => {
      setTimeout(() => {
        const anim = el.animate(keyframes, { duration, easing, fill: 'forwards' });
        anim.onfinish = resolve;
      }, delay);
    });
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  let redirectUrl = 'https://efed-gray.vercel.app/login.html';

  // If already signed in, skip login and go straight to hub
  (async function() {
    function waitForClerk() {
      return new Promise(resolve => {
        const interval = setInterval(() => {
          if (window.Clerk) { clearInterval(interval); resolve(); }
        }, 50);
      });
    }
    try {
      await waitForClerk();
      await window.Clerk.load();
      if (window.Clerk.user) redirectUrl = 'https://efed-gray.vercel.app/index.html';
    } catch(e) {}
  })();

  async function runOpener() {
    const curtain   = document.getElementById('curtain');
    const flash     = document.getElementById('flash');
    const logoWrap  = document.getElementById('logo-wrap');
    const glow      = document.getElementById('glow');
    const subText   = document.getElementById('sub-text');
    const goldLine  = document.getElementById('gold-line');
    const eq        = document.getElementById('eq');
    const skip      = document.getElementById('skip');
    const letters   = [0,1,2,3].map(i => document.getElementById('l' + i));

    let startTime = performance.now();

    // ── 1. Fade out initial black curtain ──
    curtain.animate([{opacity:1},{opacity:0}], {duration: T.curtainFade, fill:'forwards'});
    await sleep(T.curtainFade + 100);

    // ── 2. Logo wrap appears ──
    logoWrap.animate([{opacity:0,transform:'scale(1.08)'},{opacity:1,transform:'scale(1)'}],
      {duration:300, easing:'ease-out', fill:'forwards'});
    await sleep(80);

    // ── 3. Red flash (Netflix sting) ──
    flash.animate([{opacity:0},{opacity:.85},{opacity:0}],
      {duration: T.flashIn + T.flashHold + T.flashOut, easing:'ease-in-out', fill:'forwards'});

    // ── 4. Letters rise in staggered ──
    const letterPromises = letters.map((l, i) =>
      animate(l,
        [{transform:'translateY(100%)', opacity: 0},
         {transform:'translateY(0)',    opacity: 1}],
        T.letterRise,
        i * T.letterStagger,
        'cubic-bezier(.16,1,.3,1)'
      )
    );
    await Promise.all(letterPromises);

    // ── 5. Glow pulse ──
    glow.animate([{opacity:0},{opacity:1},{opacity:.6}],
      {duration: T.glowIn, easing:'ease-out', fill:'forwards'});

    // ── 6. Subtitle rises ──
    animate(subText,
      [{transform:'translateY(100%)', color:'rgba(255,255,255,0)'},
       {transform:'translateY(0)',    color:'rgba(255,255,255,0.55)'}],
      T.subRise, 0, 'cubic-bezier(.16,1,.3,1)');
    await sleep(T.subRise * 0.5);

    // ── 7. Gold line expands ──
    goldLine.animate([{width:'0px'},{width:'clamp(120px,30vw,320px)'}],
      {duration: T.goldLine, easing:'cubic-bezier(.16,1,.3,1)', fill:'forwards'});
    await sleep(T.goldLine * 0.7);

    // ── 8. EQ bars appear ──
    eq.animate([{opacity:0},{opacity:1}],
      {duration: T.eqFadeIn, fill:'forwards'});

    // Show skip button
    skip.animate([{opacity:0},{opacity:1}], {duration:400, fill:'forwards'});

    // ── 9. Hold ──
    await sleep(T.hold);

    // ── 10. Exit ──
    exitToSite();
  }

  async function exitToSite() {
    const curtain = document.getElementById('curtain');
    const flash   = document.getElementById('flash');
    const skip    = document.getElementById('skip');

    skip.animate([{opacity:1},{opacity:0}], {duration:200, fill:'forwards'});

    // Quick red flash on exit
    flash.animate([{opacity:0},{opacity:.4},{opacity:0}],
      {duration: T.exitFlash * 3, fill:'forwards'});
    await sleep(T.exitFlash);

    // Fade to black then redirect
    curtain.animate([{opacity:0},{opacity:1}],
      {duration: T.curtainIn, easing:'ease-in', fill:'forwards'});
    await sleep(T.curtainIn + 100);

    window.location.href = redirectUrl;
  }

  function skipToSite() {
    exitToSite();
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // Start after fonts load
  document.fonts.ready.then(() => {
    setTimeout(runOpener, 100);
  });
</script>
</body>
</html>
