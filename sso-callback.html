<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — EFED Streaming Hub</title>
<script>
  window.__clerk_publishable_key = 'pk_test_Z29yZ2VvdXMtYWtpdGEtODYuY2xlcmsuYWNjb3VudHMuZGV2JA';
</script>
<script async crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07070a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: #e8e8e8;
  }
  .wrap { text-align: center; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(200,168,75,.2);
    border-top-color: #c8a84b;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; color: #5a5a6a; }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>Signing you in…</p>
</div>
<script>
  window.addEventListener('load', async () => {
    try {
      await window.Clerk.load();

      // Handle the OAuth callback — this finalizes the session
      const result = await window.Clerk.handleRedirectCallback({
        redirectUrl: '/index.html',
      });

      // If handleRedirectCallback doesn't auto-navigate, do it manually
      if (window.Clerk.user) {
        window.location.replace('/index.html');
      } else {
        window.location.replace('/login.html');
      }
    } catch (e) {
      console.error('SSO callback error:', e);
      window.location.replace('/login.html');
    }
  });
</script>
</body>
</html>
