<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — EFED Streaming Hub</title>
<script>
  window.__clerk_publishable_key = 'pk_test_Z29yZ2VvdXMtYWtpdGEtODYuY2xlcmsuYWNjb3VudHMuZGV2JA';
</script>
<script async crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07070a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .spinner { width: 36px; height: 36px; border: 2px solid rgba(200,168,75,.2); border-top-color: #c8a84b; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
  (async function() {
    function waitForClerk() {
      return new Promise(resolve => {
        const interval = setInterval(() => {
          if (window.Clerk) { clearInterval(interval); resolve(); }
        }, 50);
      });
    }
    try {
      await waitForClerk();
      await window.Clerk.load({
        afterSignInUrl: 'index.html',
        afterSignUpUrl: 'index.html',
      });
      if (window.Clerk.user) {
        window.location.replace('index.html');
      } else {
        try {
          await window.Clerk.handleRedirectCallback();
          window.location.replace('index.html');
        } catch(e) {
          window.location.replace('login.html');
        }
      }
    } catch(e) {
      console.error(e);
      window.location.replace('login.html');
    }
  })();
</script>
</body>
</html>
